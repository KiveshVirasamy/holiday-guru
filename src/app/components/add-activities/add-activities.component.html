<nz-layout>
    <nz-header aria-label="Site navigation" class="flex justify-between items-center px-4 py-2 md:px-8">
        <a nz-typography class="text-2xl font-bold">
            <span class="text-slate-200">Holiday</span>
            <span class="text-blue-500">Guru</span>
        </a>
    </nz-header>
</nz-layout>


<div class="border rounded-md p-4 shadow-sm relative">
    <div class="flex items-center mb-4">
        <button class="text-blue-500 font-medium hover:text-blue-700" onclick="window.history.back()">
            &lt; Back
        </button>
        <h1 class="text-lg font-bold ml-4">Add a New Activity</h1>
    </div>
    <form [formGroup]="addActivityForm" class="space-y-4" (ngSubmit)="addUserActivity()">
        <div *ngIf="formError" class="text-red-600 mb-2">{{ formError }}</div>
        <div>
            <label for="name" class="block font-medium text-gray-700 mb-1">Name:</label>
            <input formControlName="name" type="text" id="name"
                class="form-input w-full border border-gray-400 h-12" />
            <p *ngIf="addActivityForm.get('name')?.invalid && addActivityForm.get('name')?.touched"
                class="text-sm text-red-500">Name is required and must be at least 3 characters.</p>
        </div>
        <div>
            <label for="tag" class="block font-medium text-gray-700 mb-1">Tag:</label>
            <input formControlName="tag" type="text" id="tag"
                class="form-input w-full border border-gray-400 h-12" />
            <p *ngIf="addActivityForm.get('tag')?.invalid && addActivityForm.get('tag')?.touched"
                class="text-sm text-red-500">Tag is required.</p>
        </div>
        <div>
            <label for="description" class="block font-medium text-gray-700 mb-1">Description:</label>
            <textarea formControlName="description" id="description"
                class="form-input w-full h-32 resize-none border border-gray-400"></textarea>
            <p *ngIf="addActivityForm.get('description')?.invalid && addActivityForm.get('description')?.touched"
                class="text-sm text-red-500">Description is required.</p>
        </div>
        <div>
            <label for="cost" class="block font-medium text-gray-700 mb-1">Cost:</label>
            <input formControlName="cost_estimate" type="text" id="cost"
                class="form-input border border-gray-400 w-full h-12" />
            <p *ngIf="addActivityForm.get('cost_estimate')?.invalid && addActivityForm.get('cost_estimate')?.touched"
                class="text-sm text-red-500">Cost estimate is required.</p>
        </div>
        <div>
            <label for="startTime" class="block font-medium text-gray-700 mb-1">Start Time:</label>
            <input formControlName="startTime" type="time" id="startTime"
                class="form-input border border-gray-400 w-full h-12" />
            <p *ngIf="addActivityForm.get('startTime')?.invalid && addActivityForm.get('startTime')?.touched"
                class="text-sm text-red-500">Start time is required.</p>
        </div>
        <div>
            <label for="endTime" class="block font-medium text-gray-700 mb-1">End Time:</label>
            <input formControlName="endTime" type="time" id="endTime"
                class="form-input w-full border border-gray-400 h-12" />
            <p *ngIf="addActivityForm.get('endTime')?.invalid && addActivityForm.get('endTime')?.touched"
                class="text-sm text-red-500">End time is required.</p>
        </div>
        <div>
            <label for="startLocation" class="block font-medium text-gray-700 mb-1">Start Location:</label>
            <input formControlName="startLocation" type="text" id="startLocation"
                class="form-input w-full border border-gray-400 h-12" />
            <p *ngIf="addActivityForm.get('startLocation')?.invalid && addActivityForm.get('startLocation')?.touched"
                class="text-sm text-red-500">Start location is required.</p>
        </div>
        <div>
            <label for="endLocation" class="block font-medium text-gray-700 mb-1">End Location:</label>
            <input formControlName="endLocation" type="text" id="endLocation"
                class="form-input w-full border border-gray-400 h-12" />
            <p *ngIf="addActivityForm.get('endLocation')?.invalid && addActivityForm.get('endLocation')?.touched"
                class="text-sm text-red-500">End location is required.</p>
        </div>
        <div class="text-center">
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded"
                [disabled]="addActivityForm.invalid">Add Activity</button>
            <button type="button" class="bg-gray-300 text-black px-4 py-2 rounded ml-2"
                (click)="clearForm()">Clear</button>
        </div>
    </form>
</div>
